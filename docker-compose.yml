version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: codevault_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: codevault
      POSTGRES_USER: codevault
      POSTGRES_PASSWORD: codevault_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codevault"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codevault_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.15.0
    container_name: codevault_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/codevault_pass
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  web:
    build: .
    container_name: codevault_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn codevault.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    volumes:
      - .:/app
      - chroma_data:/app/chroma_db_data
      - static_files:/app/staticfiles
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started

  celery:
    build: .
    container_name: codevault_celery
    restart: unless-stopped
    command: celery -A codevault worker -l info --concurrency 4
    volumes:
      - .:/app
      - chroma_data:/app/chroma_db_data
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: .
    container_name: codevault_beat
    restart: unless-stopped
    command: >
      celery -A codevault beat -l info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  chroma_data:
  static_files:
